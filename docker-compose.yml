services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa",
             "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-No", "-C"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    # image: ghcr.io/litom182li/cafebarrio-api:latest
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=CafeDeBarrio;
        User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: CafeDeBarrioPOS
      Jwt__Audience: CafeDeBarrioClients
      Cors__AllowedOrigin: ${CORS_ORIGIN}
      Seed__AdminPassword: ${ADMIN_PASSWORD}
      SEED_DEMO_DATA: "true"
      Sunat__Enabled: ${SUNAT_ENABLED:-false}
      Sunat__Ruc: ${SUNAT_RUC:-}
      Sunat__OseToken: ${SUNAT_OSE_TOKEN:-}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
