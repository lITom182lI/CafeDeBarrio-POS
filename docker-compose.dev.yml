services:
  sqlserver-dev:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DevLocal123!"
      MSSQL_PID: "Express"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver-dev-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "DevLocal123!", "-Q", "SELECT 1", "-No", "-C"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  sqlserver-dev-data:
