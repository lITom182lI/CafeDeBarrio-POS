name: CI — Café de Barrio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore src/CafeBarrio.sln

      - name: Build (Release)
        run: dotnet build src/CafeBarrio.sln --configuration Release --no-restore

      - name: Unit Tests
        run: >
          dotnet test tests/CafeBarrio.Tests.Unit
          --filter "Category!=Integration"
          --no-build
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

      - name: Build Dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Test pos-pwa (Vitest)
        working-directory: pos-pwa
        run: |
          npm ci
          npx vitest run

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      TEST_DB_CONNECTION: >-
        Server=localhost,1433;Database=CafeDeBarrioTest;User Id=sa;Password=${{ secrets.MSSQL_CI_SA_PASSWORD }};TrustServerCertificate=True;

    steps:
      - uses: actions/checkout@v4

      - name: Start SQL Server container
        run: |
          docker run -e ACCEPT_EULA=Y -e MSSQL_SA_PASSWORD="${{ secrets.MSSQL_CI_SA_PASSWORD }}" \
            -p 1433:1433 \
            --name sqlserver \
            --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${{ secrets.MSSQL_CI_SA_PASSWORD }}' -Q 'SELECT 1' -No -C" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=15 \
            -d mcr.microsoft.com/mssql/server:2022-latest
            
          echo "Waiting for SQL Server to be healthy..."
          while [ "$(docker inspect -f '{{.State.Health.Status}}' sqlserver)" != "healthy" ]; do
            sleep 2
          done

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore src/CafeBarrio.sln

      - name: Build
        run: dotnet build src/CafeBarrio.sln --configuration Release --no-restore

      - name: Apply EF migrations to test DB
        run: >
          dotnet ef database update
          --project src/CafeBarrio.Infrastructure
          --startup-project src/CafeBarrio.API
          --connection "$TEST_DB_CONNECTION"

      - name: Integration Tests
        run: >
          dotnet test tests/CafeBarrio.Tests.Integration
          --filter "Category=Integration"
          --no-build
          --logger "trx;LogFileName=integration-results.trx"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: "**/*.trx"
