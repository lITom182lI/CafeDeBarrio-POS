name: CI — Café de Barrio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore src/CafeBarrio.sln

      - name: Build (Release)
        run: dotnet build src/CafeBarrio.sln --configuration Release --no-restore

      - name: Unit Tests
        run: >
          dotnet test tests/CafeBarrio.Tests.Unit
          --filter "Category!=Integration"
          --no-build
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

      - name: Build Dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build
