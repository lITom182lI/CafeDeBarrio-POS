name: CI — Café de Barrio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore src/CafeBarrio.sln

      - name: Build (Release)
        run: dotnet build src/CafeBarrio.sln --configuration Release --no-restore

      - name: Unit Tests
        run: >
          dotnet test tests/CafeBarrio.Tests.Unit
          --configuration Release
          --filter "Category!=Integration"
          --no-build
          --logger "trx;LogFileName=unit-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

      - name: Build Dashboard
        working-directory: dashboard
        run: |
          npm install
          npm run build

      - name: Test pos-pwa (Vitest)
        working-directory: pos-pwa
        run: |
          npm install
          npx vitest run

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      TEST_DB_CONNECTION: >-
        Server=localhost,1433;Database=CafeDeBarrioTest;User Id=sa;Password=${{ secrets.MSSQL_CI_SA_PASSWORD }};TrustServerCertificate=True;

    steps:
      - uses: actions/checkout@v4

      - name: Start SQL Server container
        run: |
          docker run -e ACCEPT_EULA=Y -e MSSQL_SA_PASSWORD="${{ secrets.MSSQL_CI_SA_PASSWORD }}" \
            -p 1433:1433 \
            --name sqlserver \
            --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${{ secrets.MSSQL_CI_SA_PASSWORD }}' -Q 'SELECT 1' -No -C" \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=15 \
            -d mcr.microsoft.com/mssql/server:2022-latest

          echo "Waiting for SQL Server to be healthy..."
          ATTEMPTS=0
          MAX_ATTEMPTS=60
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' sqlserver 2>/dev/null)
            if [ "$STATUS" = "healthy" ]; then
              echo "SQL Server is healthy after $((ATTEMPTS * 2))s"
              break
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            if [ $ATTEMPTS -eq $MAX_ATTEMPTS ]; then
              echo "SQL Server failed to become healthy in 120s"
              docker logs sqlserver
              exit 1
            fi
            sleep 2
          done

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore src/CafeBarrio.sln

      - name: Build
        run: dotnet build src/CafeBarrio.sln --configuration Release --no-restore

      - name: Install EF tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply EF migrations to test DB
        run: >
          dotnet ef database update
          --project src/CafeBarrio.Infrastructure
          --startup-project src/CafeBarrio.API
          --connection "$TEST_DB_CONNECTION"

      - name: Integration Tests
        run: >
          dotnet test tests/CafeBarrio.Tests.Integration
          --configuration Release
          --filter "Category=Integration"
          --no-build
          --logger "trx;LogFileName=integration-results.trx"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: "**/*.trx"

  sbom:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Generate SBOM
        run: dotnet-CycloneDX src/CafeBarrio.sln -o . --json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json

  docker-publish:
    runs-on: ubuntu-latest
    needs: [build-and-test, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ""

    steps:
      - uses: actions/checkout@v4

      - name: Apply EF migrations (prod)
        if: false # TODO: configurar PROD_DB_CONNECTION en GitHub secrets
        env:
          MIGRATION_CONNECTION: ${{ secrets.PROD_DB_CONNECTION }}
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update \
            --project src/CafeBarrio.Infrastructure \
            --startup-project src/CafeBarrio.API \
            --connection "$MIGRATION_CONNECTION"

      - name: Derive lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cafebarrio-api" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
