name: Azure Deploy — Café de Barrio

on:
  workflow_run:
    workflows: ["CI — Café de Barrio"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore src/CafeBarrio.sln

      - name: Build
        run: dotnet build src/CafeBarrio.sln --configuration Release --no-restore

      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply EF migrations (Azure SQL)
        env:
          MIGRATION_CONNECTION: ${{ secrets.PROD_DB_CONNECTION }}
        run: |
          dotnet ef database update \
            --project src/CafeBarrio.Infrastructure \
            --startup-project src/CafeBarrio.API \
            --connection "$MIGRATION_CONNECTION"

      - name: Derive lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cafebarrio-api:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build pos-pwa
        working-directory: pos-pwa
        env:
          VITE_API_URL: ${{ secrets.AZURE_API_URL }}
          VITE_SEDE_ID: "1"
        run: |
          npm install
          npm run build

      - name: Deploy pos-pwa to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN_POS }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "pos-pwa/dist"
          output_location: ""
          skip_app_build: true

      - name: Build dashboard
        working-directory: dashboard
        env:
          VITE_API_URL: ${{ secrets.AZURE_API_URL }}
          VITE_SEDE_ID: "1"
        run: |
          npm install
          npm run build

      - name: Deploy dashboard to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN_DASHBOARD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "dashboard/dist"
          output_location: ""
          skip_app_build: true
